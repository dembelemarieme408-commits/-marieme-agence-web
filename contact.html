<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | SoundWave Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Style spécifique pour les inputs pour rester dans le thème noir/beige */
        .form-control {
            background-color: #1e1e1e;
            border: 1px solid var(--beige);
            color: white;
            border-radius: 0;
        }
        .form-control:focus {
            background-color: #252525;
            border-color: white;
            color: white;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SOUNDWAVE STUDIO</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Accueil</a>
                <a class="nav-link" href="services.html">Services</a>
                <a class="nav-link" href="apropos.html">À propos</a>
                <a class="nav-link active" href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <section class="container py-5">
        <div class="row">
            <div class="col-md-5 mb-5">
                <h2 class="mb-4" style="color: var(--beige);">Nous trouver</h2>
                <div class="mb-3">
                    <strong>📍 Adresse :</strong><br>
                    Cocody, Abidjan , Cote d'Ivoire
                </div>
                <div class="mb-3">
                    <strong>📞 Téléphone :</strong><br>
                    +225 07 00 00 00 00
                </div>
                <div class="mb-3">
                    <strong>🕒 Horaires :</strong><br>
                    Lundi - Samedi : 09h00 - 22h00
                </div>
            </div>

            <div class="col-md-7">
                <div class="p-4 bg-dark border border-secondary shadow">
                    <h2 class="h4 mb-4 text-center">Réserver une séance</h2>
                    <form>
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Nom complet" required>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" placeholder="Email" required>
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" rows="4" placeholder="Décrivez votre projet..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-custom w-100 text-uppercase">Envoyer le message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-center">
        <p>© 2026 SoundWave Studio | Abidjan</p>
    </footer>

</body>
</html>
